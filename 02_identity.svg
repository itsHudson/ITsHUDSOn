<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#07080f"/>
      <stop offset="100%" stop-color="#0d0f1e"/>
    </linearGradient>
    <linearGradient id="avatarG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2540"/>
      <stop offset="100%" stop-color="#0d0f1e"/>
    </linearGradient>
    <linearGradient id="nameG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="shimmerG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="33%" stop-color="#38bdf8"/>
      <stop offset="66%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="20" y="15" width="760" height="170" rx="14"/>
    </clipPath>
  </defs>

  <rect width="800" height="200" fill="url(#bgG)"/>

  <!-- Card background -->
  <rect x="20" y="15" width="760" height="170" rx="14" fill="#161929" stroke="#38bdf833" stroke-width="1"/>

  <!-- Scanning line animation -->
  <rect x="20" y="15" width="760" height="2" fill="url(#shimmerG)" opacity="0.7" clip-path="url(#cardClip)">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,170" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.05;0.95;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets -->
  <path d="M28,23 L28,35 M28,23 L40,23" stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M772,23 L772,35 M772,23 L760,23" stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M28,177 L28,165 M28,177 L40,177" stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M772,177 L772,165 M772,177 L760,177" stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Avatar box -->
  <rect x="40" y="35" width="88" height="88" rx="10" fill="url(#avatarG)" stroke="#38bdf844" stroke-width="1"/>
  <text x="84" y="82" text-anchor="middle" font-family="'Space Mono',monospace" font-size="22" font-weight="700" fill="url(#nameG)">CJH</text>
  <text x="84" y="98" text-anchor="middle" font-family="'Space Mono',monospace" font-size="7" fill="#64748b" letter-spacing="1">UID · HDS-2024</text>
  <text x="84" y="110" text-anchor="middle" font-family="'Space Mono',monospace" font-size="7" fill="#64748b" letter-spacing="1">CLEARANCE · ANALYST</text>

  <!-- Name + clearance badge -->
  <text x="148" y="58" font-family="'Space Mono',monospace" font-size="16" font-weight="700" fill="#e2e8f0">CHIA JIN HAU</text>
  <rect x="310" y="42" width="148" height="18" rx="4" fill="#38bdf811" stroke="#38bdf844" stroke-width="1"/>
  <text x="384" y="55" text-anchor="middle" font-family="'Space Mono',monospace" font-size="8" letter-spacing="2" fill="#38bdf8">CLEARANCE · ANALYST</text>

  <!-- Bio text -->
  <text x="148" y="80" font-family="'Space Mono',monospace" font-size="10" fill="#94a3b8">CS undergrad specialising in <tspan fill="#38bdf8" font-weight="700">Data Analytics</tspan> at APU.</text>
  <text x="148" y="95" font-family="'Space Mono',monospace" font-size="10" fill="#94a3b8">Backed by <tspan fill="#38bdf8" font-weight="700">6 years</tspan> ops — drove <tspan fill="#38bdf8" font-weight="700">25% revenue boost</tspan>, cut costs <tspan fill="#38bdf8" font-weight="700">12%</tspan>.</text>
  <text x="148" y="110" font-family="'Space Mono',monospace" font-size="10" fill="#94a3b8">Red Hat certified. Codes from Assembly to Python.</text>

  <!-- Info chips -->
  <!-- Degree -->
  <rect x="148" y="125" width="130" height="40" rx="6" fill="#0d0f1e" stroke="#1e2540" stroke-width="1"/>
  <text x="162" y="140" font-family="'Space Mono',monospace" font-size="7" letter-spacing="1.5" fill="#64748b">DEGREE</text>
  <text x="162" y="156" font-family="'Space Mono',monospace" font-size="9" font-weight="700" fill="#e2e8f0">BSc CS · Analytics</text>
  <!-- Certified -->
  <rect x="288" y="125" width="130" height="40" rx="6" fill="#0d0f1e" stroke="#1e2540" stroke-width="1"/>
  <text x="302" y="140" font-family="'Space Mono',monospace" font-size="7" letter-spacing="1.5" fill="#64748b">CERTIFIED</text>
  <text x="302" y="156" font-family="'Space Mono',monospace" font-size="9" font-weight="700" fill="#e2e8f0">Red Hat Admin</text>
  <!-- Spoken -->
  <rect x="428" y="125" width="130" height="40" rx="6" fill="#0d0f1e" stroke="#1e2540" stroke-width="1"/>
  <text x="442" y="140" font-family="'Space Mono',monospace" font-size="7" letter-spacing="1.5" fill="#64748b">SPOKEN</text>
  <text x="442" y="156" font-family="'Space Mono',monospace" font-size="9" font-weight="700" fill="#e2e8f0">EN · BM · ZH · 粤</text>
  <!-- Status -->
  <rect x="568" y="125" width="130" height="40" rx="6" fill="#0d0f1e" stroke="#1e2540" stroke-width="1"/>
  <text x="582" y="140" font-family="'Space Mono',monospace" font-size="7" letter-spacing="1.5" fill="#64748b">STATUS</text>
  <text x="582" y="156" font-family="'Space Mono',monospace" font-size="9" font-weight="700" fill="#4ade80">Open to hire</text>

  <!-- Bottom shimmer bar -->
  <rect x="20" y="182" width="760" height="3" rx="2" fill="url(#shimmerG)">
    <animate attributeName="x" values="20;-740;20" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
