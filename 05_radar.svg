<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#07080f"/>
      <stop offset="100%" stop-color="#0d0f1e"/>
    </linearGradient>
    <radialGradient id="sweepG" cx="0%" cy="100%" r="141%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="coreG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bgG)"/>

  <!-- Card -->
  <rect x="20" y="15" width="760" height="170" rx="14" fill="#161929" stroke="#1e2540" stroke-width="1"/>

  <!-- RADAR circles -->
  <circle cx="130" cy="100" r="72" fill="none" stroke="#1e2540" stroke-width="1"/>
  <circle cx="130" cy="100" r="50" fill="none" stroke="#1e2540" stroke-width="1"/>
  <circle cx="130" cy="100" r="28" fill="none" stroke="#1e2540" stroke-width="1"/>
  <!-- Cross hairs -->
  <line x1="130" y1="28" x2="130" y2="172" stroke="#1e2540" stroke-width="0.5"/>
  <line x1="58" y1="100" x2="202" y2="100" stroke="#1e2540" stroke-width="0.5"/>

  <!-- Sweep sector -->
  <g transform="translate(130,100)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
      <path d="M0,0 L0,-72 A72,72 0 0,1 72,0 Z" fill="url(#sweepG)" opacity="0.6"/>
    </g>
  </g>

  <!-- Radar core glow -->
  <circle cx="130" cy="100" r="30" fill="url(#coreG)"/>
  <circle cx="130" cy="100" r="4" fill="#38bdf8"/>

  <!-- Blips -->
  <circle cx="155" cy="62" r="4" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3.5;5;3.5" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="135" r="3" fill="#a78bfa">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.7s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;4.5;3" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="175" cy="115" r="2.5" fill="#fbbf24">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="112" cy="58" r="2.5" fill="#f0abfc">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- SCANNING label -->
  <text x="130" y="185" text-anchor="middle" font-family="'Space Mono',monospace" font-size="7" fill="#38bdf8" letter-spacing="3">SCANNING</text>

  <!-- Status panel -->
  <text x="230" y="48" font-family="'Space Mono',monospace" font-size="9" letter-spacing="3" fill="#38bdf8">// HUDSON · SYSTEM DIAGNOSTICS</text>

  <!-- Row 1 — kernel -->
  <circle cx="240" cy="75" r="5" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="75" r="9" fill="none" stroke="#4ade80" stroke-width="0.8">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="256" y="79" font-family="'Space Mono',monospace" font-size="10" fill="#64748b">kernel</text>
  <text x="340" y="79" font-family="'Space Mono',monospace" font-size="10" fill="#e2e8f0">ONLINE — all systems nominal</text>

  <!-- Row 2 — mission -->
  <circle cx="240" cy="108" r="5" fill="#fbbf24">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="108" r="9" fill="none" stroke="#fbbf24" stroke-width="0.8">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="256" y="112" font-family="'Space Mono',monospace" font-size="10" fill="#64748b">mission</text>
  <text x="340" y="112" font-family="'Space Mono',monospace" font-size="10" fill="#e2e8f0">seeking internship / data role</text>

  <!-- Row 3 — degree -->
  <circle cx="240" cy="141" r="5" fill="#a78bfa">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="141" r="9" fill="none" stroke="#a78bfa" stroke-width="0.8">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="256" y="145" font-family="'Space Mono',monospace" font-size="10" fill="#64748b">degree</text>
  <text x="340" y="145" font-family="'Space Mono',monospace" font-size="10" fill="#e2e8f0">BSc CS · Data Analytics · APU</text>

  <!-- Row 4 — location -->
  <circle cx="500" cy="75" r="5" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="75" r="9" fill="none" stroke="#4ade80" stroke-width="0.8">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.0s" repeatCount="indefinite"/>
  </circle>
  <text x="516" y="79" font-family="'Space Mono',monospace" font-size="10" fill="#64748b">location</text>
  <text x="600" y="79" font-family="'Space Mono',monospace" font-size="10" fill="#e2e8f0">Cheras, MY · open to remote</text>

  <!-- Row 5 — stack -->
  <circle cx="500" cy="108" r="5" fill="#38bdf8">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="108" r="9" fill="none" stroke="#38bdf8" stroke-width="0.8">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="516" y="112" font-family="'Space Mono',monospace" font-size="10" fill="#64748b">stack</text>
  <text x="600" y="112" font-family="'Space Mono',monospace" font-size="10" fill="#e2e8f0">Python · R · SQL · Java · ASM</text>

  <!-- Row 6 — cert -->
  <circle cx="500" cy="141" r="5" fill="#f0abfc">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="141" r="9" fill="none" stroke="#f0abfc" stroke-width="0.8">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="516" y="145" font-family="'Space Mono',monospace" font-size="10" fill="#64748b">cert</text>
  <text x="600" y="145" font-family="'Space Mono',monospace" font-size="10" fill="#e2e8f0">Red Hat System Admin</text>
</svg>
