<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#030508"/>
      <stop offset="100%" stop-color="#07080f"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#030508" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="btnG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="borderG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0abfc" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="800" height="180" fill="url(#bgG)" rx="14"/>
  <rect x="0.5" y="0.5" width="799" height="179" rx="14" fill="none" stroke="url(#borderG)" stroke-width="1"/>

  <!-- Wormhole rings — alternating rotation directions -->
  <g transform="translate(400,90)">
    <!-- Ring 1 -->
    <ellipse rx="18" ry="5" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Ring 2 -->
    <ellipse rx="34" ry="9" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.82">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Ring 3 -->
    <ellipse rx="52" ry="14" fill="none" stroke="#f0abfc" stroke-width="0.7" opacity="0.74">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3.2s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Ring 4 -->
    <ellipse rx="70" ry="19" fill="none" stroke="#a78bfa" stroke-width="0.7" opacity="0.65">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Ring 5 -->
    <ellipse rx="90" ry="25" fill="none" stroke="#38bdf8" stroke-width="0.6" opacity="0.56">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Ring 6 -->
    <ellipse rx="112" ry="31" fill="none" stroke="#f0abfc" stroke-width="0.6" opacity="0.47">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Ring 7 -->
    <ellipse rx="136" ry="38" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.38">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="7.5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Ring 8 -->
    <ellipse rx="162" ry="45" fill="none" stroke="#38bdf8" stroke-width="0.5" opacity="0.28">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Ring 9 -->
    <ellipse rx="190" ry="53" fill="none" stroke="#f0abfc" stroke-width="0.4" opacity="0.18">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="11s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Orbiting particles -->
    <circle r="2.5" fill="#a78bfa" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="18;18" dur="2s" repeatCount="indefinite"/>
      <animateMotion path="M18,0 A18,5 0 1,1 17.99,0.01" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#38bdf8" opacity="0.85">
      <animateMotion path="M-70,0 A70,19 0 1,0 -69.99,0.01" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.8" fill="#f0abfc" opacity="0.8">
      <animateMotion path="M0,25 A90,25 0 1,1 0.01,24.99" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#fbbf24" opacity="0.75">
      <animateMotion path="M112,0 A112,31 0 1,0 111.99,0.01" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#4ade80" opacity="0.7">
      <animateMotion path="M0,-136 A136,38 0 1,1 0.01,-135.99" dur="7.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Core glow -->
    <ellipse rx="55" ry="18" fill="url(#coreGlow)"/>
    <circle r="5" fill="#a78bfa" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#fff"/>
  </g>

  <!-- Text content -->
  <text x="400" y="42" text-anchor="middle" font-family="'Space Mono',monospace" font-size="9" letter-spacing="4" fill="#a78bfa" opacity="0.7">// ENTER THE LAB</text>
  <text x="400" y="66" text-anchor="middle" font-family="'Space Mono',monospace" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="3">HUDSON LAB</text>
  <text x="400" y="84" text-anchor="middle" font-family="'Space Mono',monospace" font-size="10" fill="#38bdf8" opacity="0.8">itshudson.github.io/hudsonlab</text>

  <!-- Button -->
  <a href="https://itshudson.github.io/hudsonlab/">
    <rect x="338" y="148" width="124" height="22" rx="11" fill="url(#btnG)"/>
    <text x="400" y="163" text-anchor="middle" font-family="'Space Mono',monospace" font-size="9" font-weight="700" fill="#030508" letter-spacing="2">ENTER PORTAL ↗</text>
  </a>
</svg>
